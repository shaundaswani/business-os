# Supabase project configuration
# Used by the Supabase CLI for `supabase link` and `supabase db push`
# Reference: https://supabase.com/docs/reference/cli/config

[project]
# Your project ref — replace with the value from your Supabase dashboard URL
# e.g. https://supabase.com/dashboard/project/abcdefghijklmnop
# project_id = "your-project-ref-here"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
